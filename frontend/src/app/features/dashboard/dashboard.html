<main class="page-content">

  <app-balance-card [saldo]="account.saldo()"></app-balance-card>

  <section class="quick-actions">

    <button routerLink="/deposito">Depositar</button>

    <button routerLink="/transferencia">Transferir</button>

    <button routerLink="/extrato">Extrato</button>

  </section>

  <section class="transactions">

    <h2>Últimas movimentações</h2>

    <ul>

      @for (movimentacao of movimentacoes(); track movimentacao.id) {

      <app-transaction-item [movimentacao]="movimentacao"></app-transaction-item>

        }

    </ul>

  </section>

</main>
