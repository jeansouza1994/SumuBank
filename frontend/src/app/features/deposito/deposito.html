<main class="page-content">

  <app-page-header
      title="Depósito">
  </app-page-header>

<section class="form-card">

  <h2>Novo depósito</h2>

  <form [formGroup]="depositoForm" (ngSubmit)="onSubmit()">

    <div class="form-group">

      <app-currency-input
        formControlName="valor"
        label="Valor do depósito">
      </app-currency-input>

        @if (depositoForm.controls.valor.touched && depositoForm.controls.valor.invalid) {

            <small class="error-message">

            @if (depositoForm.controls.valor.hasError('required')) {
            O valor é obrigatório.
            }

            @if (depositoForm.controls.valor.hasError('min')) {
            O valor deve ser maior que R$ 0,00.
            }

            </small>

        }

    </div>

    <div class="form-group">

      <label for="descricao">
        Descrição (opcional)
      </label>

      <input
        id="descricao"
        type="text"
        formControlName="descricao"
        placeholder="Ex.: Depósito em dinheiro">

    </div>

    <button class="btn-primary" type="submit" [disabled]="depositoForm.invalid">

      Confirmar depósito

    </button>

  </form>

</section>

</main>
